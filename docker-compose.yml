version: '3.8'

services:
  birdwatch:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - recordings:/app/recordings
      - logs:/app/logs
      - birdwatch_db:/app/data
    devices:
      - '/dev/snd:/dev/snd'
    group_add:
      - audio
    privileged: true
    environment:
      - PORT=5000
      - DB_PATH=/app/data/birdwatch.db
    restart: unless-stopped

volumes:
  recordings:
  logs:
  birdwatch_db:
