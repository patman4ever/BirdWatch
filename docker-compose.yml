version: '3.8'

services:
  birdwatch:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - recordings:/app/recordings
      - logs:/app/logs
      - birdwatch_db:/app/data
      # USB microphone passthrough
      - /dev/snd:/dev/snd
    devices:
      - /dev/snd:/dev/snd
    privileged: true
    environment:
      - PORT=5000
      - DB_PATH=/app/data/birdwatch.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  recordings:
  logs:
  birdwatch_db:
